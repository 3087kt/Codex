<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>顧客詳細</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="container">
    <h1>顧客詳細画面</h1>

    <dl class="detail-list">
        <dt>ID</dt><dd th:text="${customer.id}"></dd>
        <dt>氏名</dt><dd th:text="${customer.name}"></dd>
        <dt>電話番号</dt><dd th:text="${customer.phoneNumber}"></dd>
        <dt>住所</dt><dd th:text="${customer.address}"></dd>
        <dt>メールアドレス</dt><dd th:text="${customer.email}"></dd>
    </dl>

    <form th:action="@{/customers/results}" method="get" class="back-form">
        <input type="hidden" name="name" th:value="${searchForm.name}">
        <input type="hidden" name="address" th:value="${searchForm.address}">
        <input type="hidden" name="phoneNumber" th:value="${searchForm.phoneNumber}">
        <button type="submit">戻る</button>
    </form>
</div>
</body>
</html>
