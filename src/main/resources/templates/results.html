<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>顧客検索結果</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="container">
    <h1>顧客検索結果一覧</h1>

    <table>
        <thead>
        <tr>
            <th>氏名</th>
            <th>電話番号</th>
            <th>住所</th>
            <th>詳細</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(results)}">
            <td colspan="4">該当する顧客情報がありません。</td>
        </tr>
        <tr th:each="customer : ${results}">
            <td th:text="${customer.name}"></td>
            <td th:text="${customer.phoneNumber}"></td>
            <td th:text="${customer.address}"></td>
            <td>
                <form th:action="@{/customers/{id}(id=${customer.id})}" method="get">
                    <input type="hidden" name="name" th:value="${searchForm.name}">
                    <input type="hidden" name="address" th:value="${searchForm.address}">
                    <input type="hidden" name="phoneNumber" th:value="${searchForm.phoneNumber}">
                    <button type="submit">詳細</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <form th:action="@{/customers/search}" method="get" class="back-form">
        <button type="submit">戻る</button>
    </form>
</div>
</body>
</html>
