<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>顧客エラー</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="container">
    <h1>エラー画面</h1>

    <div class="error-box" th:text="${errorMessage}"></div>

    <form th:action="@{/customers/results}" method="get" class="back-form">
        <input type="hidden" name="name" th:value="${searchForm.name}">
        <input type="hidden" name="address" th:value="${searchForm.address}">
        <input type="hidden" name="phoneNumber" th:value="${searchForm.phoneNumber}">
        <button type="submit">戻る</button>
    </form>
</div>
</body>
</html>
